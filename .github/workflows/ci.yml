name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build, vet, fmt, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Check formatting
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test ./...

  e2e:
    name: SQL end-to-end (haybarn)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      # uv provides the haybarn-unittest tool installer.
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install haybarn-unittest
        run: |
          uv tool install haybarn-unittest
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # The .test files LOAD the `vgi` extension (a signed DuckDB community
      # extension). On a dev box it's already installed; on a clean CI runner we
      # must install it into haybarn's extension cache first, otherwise LOAD vgi
      # fails with "Extension ... vgi.duckdb_extension not found".
      - name: Warm vgi community extension
        run: |
          mkdir -p /tmp/hbwarm
          cat > /tmp/hbwarm/_warm.test <<'EOF'
          # name: _warm.test
          # group: [warm]

          statement ok
          INSTALL vgi FROM community;
          EOF
          haybarn-unittest /tmp/hbwarm/_warm.test

      - name: SQL end-to-end
        run: make test-sql
